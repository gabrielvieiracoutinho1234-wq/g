<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Página Principal - GLCG</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
* { box-sizing: border-box; }
body { margin: 0; font-family: 'Poppins', sans-serif; background-color: #fff; display: flex; flex-direction: column; min-height: 100vh; }
header { width: 100%; background-color: #000; display: flex; justify-content: center; align-items: center; padding: 20px 0; }
.logo { display: flex; flex-direction: column; align-items: center; color: #c0392b; font-weight: 700; font-size: 38px; line-height: 1; }
.logo span { color: #2e7d32; font-size: 14px; letter-spacing: 1px; }
.main-container { display: flex; flex: 1; }
.sidebar { width: 250px; background: #e3e3e3; padding-top: 30px; display: flex; flex-direction: column; gap: 10px; }
.menu-item { display: flex; align-items: center; gap: 12px; padding: 14px 20px; text-decoration: none; color: #000; font-size: 16px; border-radius: 8px; cursor: pointer; }
.menu-item:hover, .menu-item.active { background-color: #d5d5d5; }
.icon { width: 26px; height: 26px; }
.content { flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px; }
.view-section { display: none; width: 100%; max-width: 900px; }
.view-section.active { display: block; }
.welcome-box { background: #d9d9d9; padding: 40px 60px; border-radius: 40px; font-size: 28px; text-align: center; margin: 0 auto; max-width: 500px; }
.profile-box, .admin-box { background: #f4f4f4; padding: 40px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
.profile-box h2, .admin-box h2 { margin-top: 0; color: #c0392b; margin-bottom: 25px; }
.profile-info { margin-bottom: 15px; font-size: 16px; border-bottom: 1px solid #ddd; padding-bottom: 8px; }
.user-table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
.user-table th, .user-table td { border: 1px solid #ddd; padding: 12px; text-align: left; font-size: 14px; }
.user-table th { background-color: #222; color: white; }
.btn-action { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; margin-right: 5px; font-weight: 600; }
.btn-edit { background: #f0ad4e; color: white; }
.btn-del { background: #d9534f; color: white; }
.footer-logo { position: fixed; bottom: 10px; right: 20px; font-size: 14px; opacity: 0.7; }
</style>
</head>
<body>

<header>
  <div class="logo">GLCG<span>SUPERMERCADO</span></div>
</header>

<div class="main-container">
  <div class="sidebar">
    <div onclick="alternarAba('inicio')" class="menu-item id-menu active" id="menu-inicio">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <span>Início</span>
    </div>
    <a href="estoque.html" class="menu-item">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><rect x="3" y="3" width="18" height="13" rx="2"/><path d="M3 10h18M7 21h10"/></svg>
      <span>Estoque</span>
    </a>
    <div onclick="alternarAba('perfil')" class="menu-item id-menu" id="menu-perfil">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Perfil</span>
    </div>
    <div onclick="alternarAba('admin')" class="menu-item id-menu" id="menu-admin" style="display: none;">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="darkred" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <span style="color: darkred; font-weight: 600;">Gerenciar Usuários</span>
    </div>
    <div onclick="fazerLogout()" class="menu-item">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><path d="M10 17l5-5-5-5"/><path d="M3 12h12"/><path d="M19 3v18"/></svg>
      <span>Sair</span>
    </div>
  </div>

  <div class="content">
    <div id="set-inicio" class="view-section active">
      <div class="welcome-box">Bem-vindo ao<br>Supermercado GLCG!</div>
    </div>
    <div id="set-perfil" class="view-section">
      <div class="profile-box">
        <h2>Meu Perfil</h2>
        <div class="profile-info"><strong>Documento / Função:</strong> <span id="perf-doc">---</span></div>
        <div class="profile-info"><strong>E-mail Cadastrado:</strong> <span id="perf-email">---</span></div>
      </div>
    </div>
    <div id="set-admin" class="view-section">
      <div class="admin-box">
        <h2>Painel do Administrador</h2>
        <table class="user-table">
          <thead>
            <tr><th>Documento (Login)</th><th>E-mail</th><th>Senha</th><th>Permissão</th><th>Ações</th></tr>
          </thead>
          <tbody id="tabelaUsuariosCorpo"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
let usuarioLogado = JSON.parse(localStorage.getItem('usuarioLogado'));

function inicializarBanco() {
  let usuarios = JSON.parse(localStorage.getItem('usuarios')) || [];
  const gabrielExiste = usuarios.some(u => u.email === 'gabriel.coutinho.71318@alunos.unialfa.com.br');
  if (!gabrielExiste) {
    usuarios.push({ login: '713.184.191-90', email: 'gabriel.coutinho.71318@alunos.unialfa.com.br', senha: '05010411', isAdmin: true });
    localStorage.setItem('usuarios', JSON.stringify(usuarios));
  }
}
inicializarBanco();

if(!usuarioLogado){
  alert("Acesso negado!");
  window.location.href = 'login.html';
} else {
  atualizarCardsPerfil();
  if(usuarioLogado.isAdmin === true) {
    document.getElementById('menu-admin').style.display = 'flex';
    carregarTabelaUsuarios();
  }
}

function atualizarCardsPerfil() {
  document.getElementById('perf-doc').textContent = usuarioLogado.login + (usuarioLogado.isAdmin ? " (Administrador)" : " (Usuário Comum)");
  document.getElementById('perf-email').textContent = usuarioLogado.email;
}

function alternarAba(aba) {
  document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.id-menu').forEach(el => el.classList.remove('active'));
  document.getElementById('set-' + aba).classList.add('active');
  document.getElementById('menu-' + aba).classList.add('active');
}

function carregarTabelaUsuarios() {
  const usuarios = JSON.parse(localStorage.getItem('usuarios')) || [];
  const corpoTabela = document.getElementById('tabelaUsuariosCorpo');
  corpoTabela.innerHTML = '';
  usuarios.forEach((user, index) => {
    const nivelPermissao = user.isAdmin ? "⭐ Administrador" : "👤 Usuário Comum";
    corpoTabela.innerHTML += `
      <tr>
        <td>${user.login}</td>
        <td>${user.email}</td>
        <td>${user.senha}</td>
        <td><strong>${nivelPermissao}</strong></td>
        <td>
          <button class="btn-action btn-edit" onclick="editarUsuarioCompleto(${index})">Gerenciar</button>
          <button class="btn-action btn-del" onclick="deletarUsuario(${index})">Excluir</button>
        </td>
      </tr>`;
  });
}

function editarUsuarioCompleto(index) {
  const usuarios = JSON.parse(localStorage.getItem('usuarios'));
  let user = usuarios[index];
  const novoLogin = prompt(`Alterar Documento:`, user.login);
  if (novoLogin === null) return;
  const novoEmail = prompt(`Alterar E-mail:`, user.email);
  if (novoEmail === null) return;
  const novaSenha = prompt(`Alterar Senha:`, user.senha);
  if (novaSenha === null) return;
  const mudarCargo = confirm(`Definir como Administrador?`);

  user.login = novoLogin.trim() !== "" ? novoLogin.trim() : user.login;
  user.email = novoEmail.trim() !== "" ? novoEmail.trim() : user.email;
  user.senha = novaSenha.trim() !== "" ? novaSenha.trim() : user.senha;
  user.isAdmin = mudarCargo;

  usuarios[index] = user;
  localStorage.setItem('usuarios', JSON.stringify(usuarios));
  carregarTabelaUsuarios();
}

function deletarUsuario(index) {
  if(confirm("Deseja apagar este cadastro?")) {
    const usuarios = JSON.parse(localStorage.getItem('usuarios'));
    usuarios.splice(index, 1);
    localStorage.setItem('usuarios', JSON.stringify(usuarios));
    carregarTabelaUsuarios();
  }
}

function fazerLogout() {
  localStorage.removeItem('usuarioLogado');
  window.location.href = 'login.html';
}
</script>
</body>
</html>
