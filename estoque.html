<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLCG Estoque - Nuvem</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
* { box-sizing: border-box; }
body { margin: 0; font-family: 'Poppins', sans-serif; background-color: #fff; display: flex; flex-direction: column; align-items: center; }
header { width: 100%; height: 140px; background-color: #000; display: flex; justify-content: center; align-items: center; position: relative; }
.btn-home { display: flex; align-items: center; gap: 8px; color: white; font-size: 20px; position: absolute; left: 40px; cursor: pointer; border: 1px solid #444; padding: 5px 15px; border-radius: 8px; transition: 0.3s; }
.btn-home:hover { background-color: #222; }
.icon-home { width: 22px; filter: brightness(0) invert(1); }
.logo { display: flex; flex-direction: column; align-items: center; margin-top: 5px; }
.logo-text { font-size: 58px; font-weight: 700; color: #d33a3a; letter-spacing: 3px; line-height: 1; }
.logo-sub { font-size: 18px; letter-spacing: 2px; color: #2e7d32; margin-top: 5px; }
.container { width: 100%; display: flex; justify-content: space-evenly; margin-top: 50px; padding: 0 20px 40px 20px; flex-wrap: wrap; gap: 20px; }
.card { width: 30%; min-width: 300px; background: white; padding: 30px; border-radius: 22px; box-shadow: 0px 4px 14px rgba(0,0,0,0.12); }
input, select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #d3d3d3; margin-bottom: 15px; background: #e9e9e9; font-size: 14px; }
.btn-red { background: #d9534f; border: none; padding: 12px 22px; border-radius: 10px; cursor: pointer; font-size: 15px; color: white; margin-top: 10px; width: 100%; }
.estoque-lista { margin-top: 20px; padding: 12px; background: #f7f7f7; border-radius: 12px; border: 1px solid #ddd; height: 380px; overflow-y: auto; }
.item-estoque { padding: 12px 0; border-bottom: 1px solid #dcdcdc; font-size: 14px; position: relative; }
.mov-item { font-size: 13px; background: #fff; padding: 6px; border-radius: 6px; margin-top: 4px; border: 1px solid #ddd; }
/* Estilo do botão de excluir */
.btn-excluir { background: #d9534f; color: white; border: none; padding: 3px 8px; border-radius: 6px; cursor: pointer; font-size: 11px; float: right; transition: 0.2s; }
.btn-excluir:hover { background: #c9302c; }
</style>
</head>
<body>
<header>
<div class="btn-home" onclick="window.location.href='principal.html'">
<img src="https://cdn-icons-png.flaticon.com/512/25/25694.png" class="icon-home" alt="Home">
<span>← Voltar</span>
</div>
<div class="logo">
<div class="logo-text">GLCG</div>
<div class="logo-sub">SUPERMERCADO</div>
</div>
</header>

<div class="container">
<div class="card">
<h2>Estoque na Nuvem</h2>
<button class="btn-red" onclick="irParaAdicionar()">+ Novo produto</button>
<div class="estoque-lista" id="listaEstoque">Carregando estoque do servidor...</div>
</div>
<div class="card" id="cardAdicionar">
<h2>Adicionar produto</h2>
<input id="nomeProduto" placeholder="Nome do Produto">
<input id="codigoSku" placeholder="Código de barras/SKU">
<input id="categoria" placeholder="Categoria">
<input id="fornecedor" placeholder="Fornecedor">
<div style="display:flex; gap:15px;"><input id="quantidade" type="number" placeholder="Quantidade" style="width:48%"><input id="unidade" placeholder="Unidade" style="width:48%"></div>
<div style="display:flex; gap:15px;"><input id="preco" type="number" placeholder="Preço de custo" style="width:48%"><input id="dataOrdem" type="date" style="width:48%"></div>
<button class="btn-red" onclick="salvarProduto()">Salvar</button>
</div>
<div class="card">
<h2>Movimentar estoque</h2>
<select id="produtoMov"><option value="">Produto</option></select>
<select id="tipoMov"><option value="">Tipo</option><option value="entrada">Entrada</option><option value="saida">Saída</option></select>
<input id="qtdMov" type="number" placeholder="Quantidade">
<input id="motivoMov" placeholder="Motivo">
<button class="btn-red" onclick="registrarMovimentacao()">Registrar</button>
</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBA4LXRddqPrl1R6uPA_bpXp2YX7R2cgxM",
    authDomain: "glcg-estoque.firebaseapp.com",
    projectId: "glcg-estoque",
    storageBucket: "glcg-estoque.firebasestorage.app",
    messagingSenderId: "12701833714",
    appId: "1:12701833714:web:1f9aa8a5d36394b86a736b",
    measurementId: "G-RD4KCVP7KD"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const usuarioLogado = JSON.parse(localStorage.getItem('usuarioLogado'));
  if(!usuarioLogado){
    alert("Acesso negado! Faça login primeiro.");
    window.location.href = 'login.html';
  }

  const cpfUsuario = usuarioLogado.login.replace(/\D/g, '');
  let estoque = [];

  async function carregarEstoqueDoServidor() {
    try {
      const docRef = doc(db, "estoques", cpfUsuario);
      const docSnap = await getDoc(docRef);

      if (docSnap.exists()) {
        estoque = docSnap.data().produtos || [];
      } else {
        estoque = [];
      }
      atualizarListaEstoque();
      atualizarSelectProdutos();
    } catch (erro) {
      console.error("Erro ao buscar dados: ", erro);
      document.getElementById("listaEstoque").innerHTML = "Erro ao carregar dados do servidor.";
    }
  }

  window.salvarProduto = async function() {
    let nomeInput = document.getElementById("nomeProduto");
    let qtdInput = document.getElementById("quantidade");
    let nome = nomeInput.value.trim();
    let qtd = Number(qtdInput.value);

    if(!nome || !qtd){ alert("Preencha nome e quantidade!"); return; }

    estoque.push({ nome, quantidade: qtd, historico: [] });

    try {
      await setDoc(doc(db, "estoques", cpfUsuario), { produtos: estoque });

      nomeInput.value = ""; qtdInput.value = "";
      document.getElementById("codigoSku").value = "";
      document.getElementById("categoria").value = "";
      document.getElementById("fornecedor").value = "";
      document.getElementById("unidade").value = "";
      document.getElementById("preco").value = "";
      document.getElementById("dataOrdem").value = "";

      alert("Produto salvo na Nuvem com sucesso!");
      carregarEstoqueDoServidor();
    } catch (erro) {
      alert("Erro ao salvar produto na nuvem.");
      console.error(erro);
    }
  };

  // NOVA FUNÇÃO: Excluir produto do estoque e atualizar a nuvem
  window.excluirProduto = async function(index) {
    if(confirm(`Tem certeza que deseja excluir o produto "${estoque[index].nome}"?`)) {
      estoque.splice(index, 1); // Remove o item do array local

      try {
        // Envia o array atualizado de volta para o Firebase
        await setDoc(doc(db, "estoques", cpfUsuario), { produtos: estoque });
        alert("Produto excluído com sucesso!");
        carregarEstoqueDoServidor(); // Recarrega a lista no ecrã
      } catch (erro) {
        alert("Erro ao excluir o produto da nuvem.");
        console.error(erro);
      }
    }
  };

  window.registrarMovimentacao = async function() {
    let id = document.getElementById("produtoMov").value;
    let tipo = document.getElementById("tipoMov").value;
    let qtd = Number(document.getElementById("qtdMov").value);
    let motivo = document.getElementById("motivoMov").value.trim();

    if(id==="" || tipo==="" || qtd<=0){ alert("Preencha todos os campos!"); return; }
    if(tipo==="saida" && estoque[id].quantidade < qtd){ alert("Estoque insuficiente!"); return; }

    if(tipo==="entrada") estoque[id].quantidade += qtd;
    else estoque[id].quantidade -= qtd;

    estoque[id].historico.push({ tipo, qtd, motivo });

    try {
      await setDoc(doc(db, "estoques", cpfUsuario), { produtos: estoque });

      document.getElementById("qtdMov").value = "";
      document.getElementById("motivoMov").value = "";
      alert("Movimentação registrada e salva na nuvem!");
      carregarEstoqueDoServidor();
    } catch (erro) {
      alert("Erro ao atualizar movimentação.");
      console.error(erro);
    }
  };

  function atualizarListaEstoque(){
    let div = document.getElementById("listaEstoque"); 
    div.innerHTML = "";
    estoque.forEach((item, index) => {
      let movs = item.historico.map(m => `<div class='mov-item'>${m.tipo.toUpperCase()} — ${m.qtd} (${m.motivo})</div>`).join('');
      
      // Adicionado o botão "Excluir" ao lado de cada produto da lista
      div.innerHTML += `
        <div class='item-estoque'>
          <button class='btn-excluir' onclick='excluirProduto(${index})'>Excluir</button>
          <strong>${item.nome}</strong> — ${item.quantidade} unidades
          <div>${movs}</div>
        </div>`;
    });
    if(estoque.length === 0) div.innerHTML = "Nenhum produto cadastrado neste perfil.";
  }

  function atualizarSelectProdutos(){
    let select = document.getElementById("produtoMov");
    select.innerHTML = `<option value="">Produto</option>`;
    estoque.forEach((item, i) => select.innerHTML += `<option value="${i}">${item.nome}</option>`);
  }

  window.irParaAdicionar = function() {
    document.getElementById("cardAdicionar").scrollIntoView({ behavior: "smooth" });
  };

  carregarEstoqueDoServidor();
</script>
</body>
</html>
